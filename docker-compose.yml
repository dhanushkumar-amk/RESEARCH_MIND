version: '3.8'

services:
  mlflow:
    image: python:3.11-slim
    container_name: researchmind_mlflow
    # Installing mlflow and dependencies at startup to ensure the image runs successfully
    command: >
      sh -c "pip install --no-cache-dir mlflow boto3 pymongo &&
             mlflow server
             --backend-store-uri sqlite:///mlflow.db
             --default-artifact-root ./artifacts
             --host 0.0.0.0
             --port 5000"
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    networks:
      - researchmind_network
    restart: always

networks:
  researchmind_network:
    name: researchmind_network
    driver: bridge

volumes:
  mlflow_data:
    driver: local
